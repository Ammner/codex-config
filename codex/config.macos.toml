[projects.'{{CODEX_WORK_ROOT}}']
trust_level = "trusted"

[projects.'{{HERMES_WORK_ROOT}}']
trust_level = "trusted"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--no-usage-statistics", "--user-data-dir", "{{HERMES_WORK_ROOT}}/browser-profiles/chrome-devtools", "--viewport", "1280x900", "--redact-network-headers"]
startup_timeout = 30

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--browser", "chrome", "--user-data-dir", "{{HERMES_WORK_ROOT}}/browser-profiles/playwright", "--output-dir", "{{HERMES_WORK_ROOT}}/logs/playwright", "--timeout-action", "7000", "--timeout-navigation", "60000"]
startup_timeout = 30

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout = 30

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
startup_timeout = 30

[mcp_servers.youtube-transcript]
command = "npx"
args = ["-y", "youtube-transcript-mcp"]
startup_timeout = 30

